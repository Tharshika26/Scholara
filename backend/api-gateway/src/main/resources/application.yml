server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**
        - id: paper-service
          uri: lb://paper-service
          predicates:
            - Path=/api/v1/papers/**
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payments/**
        - id: ai-service
          uri: http://localhost:8001
          predicates:
            - Path=/api/v1/ai/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: false # Set to true when Eureka is set up
    register-with-eureka: false # Set to true when Eureka is set up
